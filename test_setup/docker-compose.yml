services:
  # ─── 1. Harita Node ───
  harita_node:
    build: .
    container_name: siha_harita
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - .:/ros2_ws/src/siha_telemetri
    command: ros2 run siha_telemetri harita_node

  # ─── 2. NPC Publisher (Rakip İHA Simülasyonu) ───
  npc_publisher:
    build: .
    container_name: siha_publisher
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
    command: ros2 run siha_telemetri npc_publisher2

  # ─── 3. Gazebo Visualizer ───
  gazebo_visualizer:
    build: .
    container_name: siha_visualizer
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - .:/ros2_ws/src/siha_telemetri
    command: ros2 run siha_telemetri gazebo_visualizer

  # ─── 4. Web UI ───
  web_ui:
    image: python:3.10-slim
    container_name: siha_web_ui
    network_mode: host
    volumes:
      - .:/app
    working_dir: /app
    command: python3 serve_ui.py

  # ─── 5. Otonom Sistem (YENİ) ───
  autonomy:
    build: .
    container_name: siha_autonomy
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - .:/ros2_ws/src/siha_telemetri
    command: >
      ros2 run siha_autonomy main_node
        --ros-args
        -p simulation:=true
        -p mission_type:=0
        -p team_id:=1
        -p vision.camera_topic:=/camera/image_raw
        -p flight.mavlink_url:=udp:127.0.0.1:14550
