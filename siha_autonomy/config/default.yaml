# ============================================
# SAEROTECH SİHA Otonom Sistem — Konfigürasyon
# TEKNOFEST 2026 Savaşan İHA Yarışması
# ============================================

system:
  simulation_mode: true
  mission_type: 0          # 0: Savaşan İHA, 1: Kamikaze

vision:
  frame_width: 640
  frame_height: 480
  target_fps: 30
  camera_topic: "/camera/image_raw"      # Gazebo topic
  camera_device: "/dev/video0"           # Gerçek kamera

  # YOLO Ayarları
  model_path: "yolov8n.onnx"
  confidence_threshold: 0.45
  nms_threshold: 0.50
  input_size: 640
  use_tensorrt: false
  use_fp16: true

  # Vuruş Alanı (Şartname Uyumlu)
  strike_zone_h_pct: 0.50    # yatay %50
  strike_zone_v_pct: 0.80    # dikey %80
  min_target_pct: 0.06       # güvenli sınır (%6, şartname %5)

  # Kilitlenme
  lockon_duration_s: 4.0
  lockon_tolerance_s: 1.0
  frame_loss_tolerance: 0.05
  lockon_confirm_count: 4

  # Overlay (debug_image ve video kayıt)
  rect_thickness: 3
  rect_color: [255, 0, 0]   # kırmızı (BGR)
  overlay_font_scale: 0.5
  overlay_text_color: [0, 255, 0]   # yeşil (BGR)
  progress_bar_color: [0, 255, 0]   # yeşil (BGR)

flight:
  takeoff_altitude: 30.0     # metre
  cruise_altitude: 60.0
  max_altitude: 145.0
  min_altitude: 15.0
  landing_speed: 2.0
  cruise_speed: 25.0
  max_speed: 45.0
  search_speed: 20.0
  approach_speed: 15.0

  # PID Kazançları
  yaw_kp: 1.2
  yaw_ki: 0.01
  yaw_kd: 0.3
  pitch_kp: 0.8
  pitch_ki: 0.005
  pitch_kd: 0.2

  # MAVLink
  mavlink_url: "udp:127.0.0.1:14550"
  mavlink_sysid: 1
  mavlink_compid: 191

kamikaze:
  min_dive_altitude: 100.0   # metre (şartname zorunlu)
  climb_altitude: 150.0
  safe_pullup_alt: 55.0
  dive_angle_deg: -45.0
  qr_size_m: 2.0

comm:
  server_ip: "192.168.1.100"
  server_port: 8080
  team_id: 1
  send_rate_hz: 2.0
  signal_loss_timeout: 10.0

safety:
  boundary_margin_m: 50.0
  altitude_margin_m: 5.0
  signal_loss_timeout: 10.0
  rtl_battery_pct: 15.0
  emergency_battery: 5.0
  collision_radius_m: 20.0

# ─── Karar Motoru (YENİ) ─────────────────────────────────────────
decision:
  # Manevra maliyet ağırlıkları (toplam 1.0 olmalı)
  weight_distance: 0.40      # Mesafe ağırlığı
  weight_angle: 0.30         # Açı farkı ağırlığı
  weight_maneuver: 0.20      # Manevra maliyeti ağırlığı
  weight_eta: 0.10           # Tahmini erişim süresi ağırlığı

  # Kaçınma parametreleri
  evade_range_m: 50.0        # Kaçınma tetikleme mesafesi (m)
  evade_speed_ms: 5.0        # Yaklaşma hızı eşiği (m/s)
  evade_angle_min: 120.0     # Arkadan gelme açısı eşiği (derece)
  clear_range_m: 100.0       # Tehdidin uzaklaştığı mesafe (m)

  # Sınırlar
  max_range_m: 5000.0        # Maksimum hedef mesafesi
  reselect_period_s: 1.0     # Hedef yeniden değerlendirme periyodu (s)
  relock_penalty: 50.0       # Aynı hedefe tekrar kilit cezası

recording:
  output_dir: "/tmp/siha_video/"
  video_fps: 30
  codec: "libx264"
  format: "mp4"
  video_width: 640
  video_height: 480
